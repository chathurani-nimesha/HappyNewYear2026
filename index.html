<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Year Surprise 🎉</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#000428,#004e92);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* FIREWORKS */
canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

/* SPARKLES */
.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation: floatUp 6s linear infinite;
  opacity:0.6;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0); opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1); opacity:0;}
}

.container{
  text-align:center;
  z-index:2;
}

h1{
  font-size:2.5rem;
  margin-bottom:20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #fff;}
  to{text-shadow:0 0 25px #00e6ff;}
}

/* GIFT */
.gift{
  font-size:80px;
  cursor:pointer;
  animation:bounce 1.5s infinite;
  transition:0.3s;
}

.gift:hover{
  transform:scale(1.2);
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* CARD */
.card{
  display:none;
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  max-width:350px;
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.7);}
  to{opacity:1; transform:scale(1);}
}

.card p{
  margin:8px 0;
  font-size:1rem;
  line-height:1.4;
}

/* BUTTONS */
button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00e6ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00ff99;
  transform:scale(1.05);
}

/* MUSIC BUTTON */
.musicBtn{
  position:absolute;
  top:15px;
  right:15px;
  z-index:10;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00e6ff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="src/Deck-The-halls-Long-Version-chosic.com_.mp3" type="audio/mpeg">
</audio>

<button class="musicBtn" onclick="toggleMusic()">🎵 Play Music</button>

<div class="container">
  <h1>✨ Happy Sinhala and Tamil New Year ✨</h1>

  <div class="gift" onclick="openGift()">🎁</div>

  <div class="card" id="card">
    <h2>New Year Wishes 🎉</h2>
    <div id="wishText"></div>

    <button onclick="shareWhatsApp()">📲 Share on WhatsApp</button>
  </div>
</div>

<script>

/* 🎁 LONG RANDOM WISHES */
const wishes = [
`May this New Year bring endless happiness into your life.
May your dreams shine brighter than ever before.
May success follow you in every step you take.
And may your heart always stay full of peace and love.`,

`A new year is a new beginning filled with hope.
Leave behind all sadness and welcome joy and success.
May your journey be filled with beautiful moments.
Stay strong, stay blessed, and keep smiling always.`,

`Wishing you a year full of magical moments and achievements.
May every day bring new opportunities for you.
May your hard work turn into great success.
And may happiness never leave your side.`,

`Let this year be the turning point of your life.
May all your struggles turn into strength.
May you achieve everything you dream of.
And may peace and prosperity follow you always.`
];

/* 🎁 OPEN GIFT */
function openGift(){
  const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
  const box = document.getElementById("wishText");
  box.innerHTML = "";

  randomWish.split("\n").forEach(line=>{
    const p = document.createElement("p");
    p.innerText = line;
    box.appendChild(p);
  });

  document.getElementById("card").style.display = "block";
}

/* 📲 WHATSAPP */
function shareWhatsApp(){
  const text = "🎉 Happy New Year! Wishing you happiness, success, love & prosperity in 2026! 🎊";
  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

/* 🎵 MUSIC CONTROL */
let musicPlaying = false;
const music = document.getElementById("bgMusic");
const btn = document.querySelector(".musicBtn");

/* TRY AUTOPLAY */
window.addEventListener("load", () => {
  music.play()
  .then(() => {
    musicPlaying = true;
    btn.innerText = "🔊 Music On";
  })
  .catch(() => {
    musicPlaying = false;
    btn.innerText = "🎵 Tap to Play Music";
  });
});

/* MANUAL CONTROL */
function toggleMusic(){
  if(!musicPlaying){
    music.play().then(()=>{
      musicPlaying = true;
      btn.innerText = "🔊 Music On";
    });
  }else{
    music.pause();
    musicPlaying = false;
    btn.innerText = "🎵 Play Music";
  }
}

/* 🎆 FIREWORKS */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function Particle(x,y){
  this.x=x;
  this.y=y;
  this.radius=Math.random()*3+1;
  this.color=`hsl(${Math.random()*360},100%,60%)`;
  this.vx=(Math.random()-0.5)*5;
  this.vy=(Math.random()-0.5)*5;
  this.alpha=1;
}

function createFirework(){
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;

  for(let i=0;i<35;i++){
    particles.push(new Particle(x,y));
  }
}

function animate(){
  requestAnimationFrame(animate);
  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.01;

    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if(p.alpha<=0) particles.splice(i,1);
  });
}

setInterval(createFirework, 700);
animate();

/* ✨ SPARKLES */
for(let i=0;i<35;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(s);
}

</script>

</body>
</html>
